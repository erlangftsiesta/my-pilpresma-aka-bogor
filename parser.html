<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Seeder Generator</title>

<style>
body{
font-family: monospace;
padding:30px;
background:#111;
color:#eee;
}

textarea{
width:100%;
height:250px;
margin-bottom:20px;
background:#222;
color:#0f0;
padding:10px;
}

select,input{
padding:6px;
margin-right:10px;
margin-bottom:15px;
}

button{
padding:10px 20px;
cursor:pointer;
}

#output{
height:300px;
}
</style>
</head>

<body>

<h2>Seeder Generator</h2>

<h3>Paste Data</h3>
<textarea id="raw"></textarea>

<h3>Config</h3>

Angkatan:
<select id="angkatan">
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
</select>

Kelas:
<select id="kelas"></select>

Kolom Nama:
<input id="colNama" type="number" value="1">

Kolom NIM:
<input id="colNim" type="number" value="2">

<button onclick="generate()">Generate</button>

<h3>Output</h3>
<textarea id="output"></textarea>


<script>

const classMap = {
"1A":1,"1B":2,"1C":3,"1D":4,"1E-1":5,"1E-2":6,"1F":7,"1G":8,
"2A":9,"2B":10,"2C":11,"2D":12,"2E-1":13,"2E-2":14,"2F":15,"2G":16,
"3A":17,"3B":18,"3C":19,"3D":20,"3E":21,"3F":22,"3G":23,
"4G":24
}

const kelasSelect=document.getElementById("kelas")

function loadKelas(){

kelasSelect.innerHTML=""

const angkatan=document.getElementById("angkatan").value

for(const c in classMap){

if(c.startsWith(angkatan)){

let o=document.createElement("option")
o.value=c
o.text=c
kelasSelect.appendChild(o)

}

}

}

document.getElementById("angkatan").addEventListener("change",loadKelas)

loadKelas()

function generate(){

const raw=document.getElementById("raw").value

const colNama=parseInt(document.getElementById("colNama").value)

const colNim=parseInt(document.getElementById("colNim").value)

const kelas=kelasSelect.value

const class_id=classMap[kelas]

let lines=raw.split("\n")

let out=[]

for(let line of lines){

line=line.trim()

if(!line) continue

let parts=line.split(/\t|\s{2,}/)

if(parts.length<3) continue

let nama=parts[colNama]
let nim=parts[colNim]

if(!nim || !/^\d+/.test(nim)) continue

out.push(`['username' => '${nim}', 'nama_lengkap' => '${nama}', 'class_id' => ${class_id}],`)

}

document.getElementById("output").value=out.join("\n")

}

</script>

</body>
</html>
